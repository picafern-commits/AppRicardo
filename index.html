<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Braga</title>
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h2>App Braga</h2>
      <p>Gestão de Toners e PCs</p>
    </div>
    <a href="index.html" class="active">Dashboard</a>
    <a href="add-toner.html">Adicionar Toner</a>
    <a href="stock.html">Stock</a>
    <a href="historico.html">Histórico</a>
    <a href="computadores.html">Computadores</a>
    <a href="config.html">Configurações</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Dashboard Toners</h1>
        <p class="subtitle">Resumo geral do sistema</p>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span>Total em Stock</span>
        <strong id="countStock">0</strong>
      </div>
      <div class="stat-card">
        <span>Total Usados</span>
        <strong id="countUsados">0</strong>
      </div>
      <div class="stat-card">
        <span>Total PCs</span>
        <strong id="countPCs">0</strong>
      </div>
    </div>

    <div class="panel">
      <h3>Pesquisa rápida</h3>
      <input id="searchDashboard" type="text" placeholder="Pesquisar localização..." oninput="filtrarDashboard()">
      <div id="listaDashboardStock" class="cards-list"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>

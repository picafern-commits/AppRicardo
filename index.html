<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressoras Braga - Desktop Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <img src="assets/logo.png" alt="Logo">
      <h2>Impressoras Braga</h2>
    </div>
    <nav>
      <ul>
        <li><a href="#dashboard" class="active">Dashboard</a></li>
        <li><a href="#stock">Stock</a></li>
        <li><a href="#historico">Histórico</a></li>
        <li><a href="#config">Configurações</a></li>
      </ul>
    </nav>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content">
    <header>
      <h1>Bem-vindo ao Dashboard</h1>
    </header>

    <!-- DASHBOARD -->
    <section id="dashboard" class="section">
      <h2>Resumo Geral</h2>
      <div id="dashboardInfo" class="dashboard-cards">
        <!-- Cards preenchidos pelo JS -->
      </div>
    </section>

    <!-- STOCK -->
    <section id="stock" class="section">
      <h2>Stock de Toners</h2>
      <table id="stockInfo">
        <thead>
          <tr>
            <th>ID</th>
            <th>Modelo</th>
            <th>Local</th>
            <th>Quantidade</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- HISTÓRICO -->
    <section id="historico" class="section">
      <h2>Histórico</h2>
      <table id="historicoInfo">
        <thead>
          <tr>
            <th>ID</th>
            <th>Modelo</th>
            <th>Local</th>
            <th>Status</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- CONFIGURAÇÕES -->
    <section id="config" class="section">
      <h2>Configurações</h2>
      <label>
        Modo Escuro:
        <input type="checkbox" id="darkModeToggle">
      </label>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

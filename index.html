<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Impressoras Braga</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LATERAL -->
  <aside class="sidebar">
    <div class="logo">
      <img src="assets/icon.jpg" alt="Logo" />
      <h2>Impressoras Braga</h2>
    </div>
    <nav>
      <ul>
        <li><a href="#dashboard">Dashboard</a></li>
        <li><a href="#stock">Stock</a></li>
        <li><a href="#historico">Histórico</a></li>
        <li><a href="#config">Configurações</a></li>
      </ul>
    </nav>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content">
    <header>
      <h1>Bem‑vindo ao Dashboard</h1>
    </header>

    <section id="dashboard" class="section">
      <h2>Resumo Geral</h2>
      <div id="dashboardInfo">
        <!-- Conteúdo da tua app original -->
      </div>
    </section>

    <section id="stock" class="section">
      <h2>Stock de Toners</h2>
      <div id="stockInfo"></div>
    </section>

    <section id="historico" class="section">
      <h2>Histórico</h2>
      <div id="historicoInfo"></div>
    </section>

    <section id="config" class="section">
      <h2>Configurações</h2>
      <div id="configInfo"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Toner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="assets/logo.png" alt="Logo">
      <h2>Impressoras Braga</h2>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="stock.html">Stock</a></li>
        <li><a href="historico.html">Histórico</a></li>
        <li><a href="computadores.html">Computadores</a></li>
        <li><a href="config.html">Configurações</a></li>
      </ul>
    </nav>

  <!-- Conteúdo -->
  <main class="main-content">
    <header><h1>Adicionar Toner</h1></header>
    <section class="section">
      <form id="addTonerForm">
        <label for="modelo">Modelo:</label>
        <input type="text" id="modelo" required>
        <label for="local">Local:</label>
        <input type="text" id="local" required>
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" min="1" required>
        <button type="submit">Adicionar Toner</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
